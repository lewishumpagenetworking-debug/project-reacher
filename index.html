<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Project Reacher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <p class="eyebrow">PROJECT REACHER</p>
        <h1>Physique Dashboard</h1>
      </div>
      <button id="exportBtn">Export</button>
    </header>

    <section class="grid stats">
      <div class="card"><span>Current Weight</span><strong id="currentWeight">73.0kg</strong></div>
      <div class="card"><span>Target Weight</span><strong>89kg</strong></div>
      <div class="card"><span>Weekly Gain</span><strong id="weeklyGain">+0.25kg</strong></div>
      <div class="card"><span>Reacher Score</span><strong id="score">--/100</strong></div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Progress to 89kg</h2>
        <span id="progressText">0%</span>
      </div>
      <div class="bar"><div id="progressBar"></div></div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Today’s Workout</h2>
        <select id="daySelect"></select>
      </div>
      <div id="workoutList"></div>
    </section>

    <section class="card">
      <h2>Weekly Check-In</h2>
      <div class="form-grid">
        <label>Morning Weight <input id="weightInput" type="number" step="0.1" placeholder="73.2"></label>
        <label>Protein Avg <input id="proteinInput" type="number" placeholder="180"></label>
        <label>Sleep Avg <input id="sleepInput" type="number" step="0.1" placeholder="7.5"></label>
        <label>Sessions <input id="sessionsInput" type="number" placeholder="5"></label>
        <label>Recovery 1-10 <input id="recoveryInput" type="number" min="1" max="10"></label>
        <label>Energy 1-10 <input id="energyInput" type="number" min="1" max="10"></label>
      </div>
      <textarea id="notesInput" placeholder="Wins, issues, soreness, exercises to change..."></textarea>
      <button id="saveCheckin">Save Weekly Check-In</button>
    </section>

    <section class="card">
      <h2>Progress History</h2>
      <div id="history"></div>
    </section>

    <section class="card">
      <h2>Monthly Measurements</h2>
      <div class="form-grid">
        <label>Shoulders <input id="shoulders" type="number" step="0.1"></label>
        <label>Chest <input id="chest" type="number" step="0.1"></label>
        <label>Waist <input id="waist" type="number" step="0.1"></label>
        <label>Neck <input id="neck" type="number" step="0.1"></label>
        <label>Right Arm <input id="rarm" type="number" step="0.1"></label>
        <label>Left Arm <input id="larm" type="number" step="0.1"></label>
        <label>Right Thigh <input id="rthigh" type="number" step="0.1"></label>
        <label>Left Thigh <input id="lthigh" type="number" step="0.1"></label>
      </div>
      <button id="saveMeasurements">Save Measurements</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
